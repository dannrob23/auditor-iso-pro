name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: pip install ruff && ruff check --ignore=E402,F401,E501 .

      - name: Test with pytest
        env:
          DEEPSEEK_API_KEY: sk-test
          OPENAI_API_KEY: sk-test
          GOOGLE_API_KEY: test
          GROQ_API_KEY: test
          COOKIE_SECRET: test
        run: pip install pytest && pytest tests/ -v --tb=short
